<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>動画追加</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 8px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1>動画追加</h1>

    <!-- ============================
         AI生成データのファイル読み込み
         ============================ -->
    <h2>AI生成データのファイル読み込み</h2>

    <label>Bunny Video JSON（videoId を含む）</label>
    <input type="file" id="file_bunny_json" accept=".json,.txt" />

    <label>Summary JSON（summary_md / tags）</label>
    <input type="file" id="file_summary_json" accept=".json,.txt" />

    <label>Embedding JSON（text + embedding）</label>
    <input type="file" id="file_embedding_json" accept=".json,.txt" />

    <hr />

    <!-- ============================
         動画追加フォーム
         ============================ -->
    <form id="form">
        <label>Bunny Video ID</label>
        <input name="bunny_video_id" required />

        <label>タイトル</label>
        <input name="title" required />

        <label>説明</label>
        <textarea name="description"></textarea>

        <label>要約（Markdown）</label>
        <textarea name="summary_md"></textarea>

        <label>embedding 用テキスト</label>
        <textarea name="embedding_text"></textarea>

        <label>タグ（カンマ区切り）</label>
        <textarea name="tags"></textarea>

        <label>embedding（JSON配列）</label>
        <textarea name="embedding"></textarea>

        <button type="submit">保存</button>
    </form>

    <script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

// Cloudflare Pages の env を使用
const supabase = createClient(
  window.env.SUPABASE_URL,
  window.env.SUPABASE_ANON_KEY
);

// -------------------------------
// 汎用 JSON 読み込み関数
// -------------------------------
function loadJSONFile(input, callback) {
  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        callback(json);
      } catch (e) {
        alert("JSON の読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
  });
}

// -------------------------------
// 1. Bunny JSON → bunny_video_id
// -------------------------------
loadJSONFile(document.getElementById("file_bunny_json"), (json) => {
  document.querySelector("input[name='bunny_video_id']").value = json.videoId || "";
});

// -------------------------------
// 2. Summary JSON → summary_md / tags
//    ※ embedding_text は無視
// -------------------------------
loadJSONFile(document.getElementById("file_summary_json"), (json) => {
  if (json.summary_md) {
    document.querySelector("textarea[name='summary_md']").value = json.summary_md;
  }
  if (json.tags) {
    document.querySelector("textarea[name='tags']").value = json.tags.join(", ");
  }
});

// -------------------------------
// 3. Embedding JSON → embedding_text / embedding
// -------------------------------
loadJSONFile(document.getElementById("file_embedding_json"), (json) => {
  if (json.text) {
    document.querySelector("textarea[name='embedding_text']").value = json.text;
  }
  if (json.embedding) {
    document.querySelector("textarea[name='embedding']").value = JSON.stringify(json.embedding, null, 2);
  }
});

// -------------------------------
// フォーム送信 → Supabase 保存
// -------------------------------
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();
  const f = e.target;

  // 1. videos に保存
  const videoRes = await fetch("/api/videos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      bunny_video_id: f.bunny_video_id.value,
      title: f.title.value,
      description: f.description.value,
      tags: f.tags.value
        ? f.tags.value.split(",").map(t => t.trim())
        : []
    })
  });

  if (!videoRes.ok) {
    alert("動画情報の保存に失敗しました");
    return;
  }

  const video = await videoRes.json();

  // 2. embedding を保存
  const embedRes = await fetch(`/api/videos/${video.id}/embedding`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      summary_md: f.summary_md.value,
      embedding_text: f.embedding_text.value,
      embedding: JSON.parse(f.embedding.value),
      model: "ruri-v3-30m"
    })
  });

  if (!embedRes.ok) {
    alert("embedding の保存に失敗しました");
    return;
  }

  alert("保存しました");
  location.href = "/admin/videos";
};
    </script>

</body>
</html>
